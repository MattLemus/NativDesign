<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Detalle del producto | Nativ Design</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&family=Prata&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style/styles.css">
    <link rel="icon" type="image/png" sizes="32x32" href="assets/favicon-32.png">
    <link rel="icon" type="image/png" sizes="192x192" href="assets/favicon-192.png">
    <link rel="icon" type="image/x-icon" href="favicon.ico">
    <style>
        :root {
            --bg-main: #f9f9f9;
            --surface: #ffffff;
            --ink: #333333;
            --brand-green: #556B2F;
            --brand-green-light: #6B8E23;
            --brand-red: #D9534F;
            --brand-pink: #E6A8B8;
            --muted: #777777;
            --stroke: rgba(85, 107, 47, 0.2);
            --shadow: 0 20px 50px rgba(85, 107, 47, 0.15);
        }

        * {
            box-sizing: border-box;
        }

        body {
            margin: 0;
            min-height: 100vh;
            font-family: 'Outfit', sans-serif;
            color: var(--ink);
            background:
                radial-gradient(circle at 5% 10%, rgba(230, 168, 184, 0.25), transparent 35%),
                radial-gradient(circle at 92% 85%, rgba(143, 188, 143, 0.24), transparent 33%),
                linear-gradient(145deg, #ffffff 0%, var(--bg-main) 100%);
        }

        .producto-detalle-wrap {
            max-width: 1180px;
            margin: 0 auto;
            padding: 2.2rem 1.2rem 3rem;
            position: relative;
        }

        .top-back-link {
            display: inline-flex;
            align-items: center;
            gap: 0.5rem;
            margin-bottom: 1.3rem;
            color: var(--brand-red);
            text-decoration: none;
            font-weight: 500;
            font-size: 0.95rem;
            transition: transform 0.2s ease;
        }

        .top-back-link:hover {
            transform: translateX(-4px);
        }

        .producto-detalle-grid {
            display: grid;
            grid-template-columns: 0.95fr 1.05fr;
            gap: 0;
            align-items: stretch;
            background: linear-gradient(170deg, rgba(255, 255, 255, 0.98), rgba(252, 252, 252, 0.95));
            border: 1px solid var(--stroke);
            border-radius: 28px;
            box-shadow: var(--shadow);
            overflow: hidden;
            animation: riseIn 0.65s ease forwards;
        }

        .producto-visual {
            position: relative;
            isolation: isolate;
            background: linear-gradient(170deg, #f7f3ee 0%, #f0ebe4 100%);
            padding: clamp(1rem, 2vw, 1.8rem);
            overflow: hidden;
        }

        .producto-visual::before,
        .producto-visual::after {
            content: "";
            position: absolute;
            border-radius: 999px;
            filter: blur(2px);
            z-index: -1;
        }

        .producto-visual::before {
            width: 260px;
            height: 260px;
            right: -50px;
            top: -70px;
            background: rgba(255, 255, 255, 0.45);
        }

        .producto-visual::after {
            width: 190px;
            height: 190px;
            left: -60px;
            bottom: -60px;
            background: rgba(85, 107, 47, 0.2);
        }

        .producto-imagen {
            width: 100%;
            height: clamp(360px, 62vh, 620px);
            object-fit: contain;
            border-radius: 20px;
            border: 1px solid rgba(255, 255, 255, 0.7);
            background: rgba(255, 255, 255, 0.4);
            backdrop-filter: blur(2px);
            animation: softZoom 1s ease forwards;
        }

        .producto-etiqueta {
            position: absolute;
            left: 1.8rem;
            bottom: 1.8rem;
            margin: 0;
            padding: 0.45rem 0.8rem;
            border-radius: 999px;
            background: rgba(85, 107, 47, 0.88);
            color: #fff;
            font-size: 0.8rem;
            letter-spacing: 0.04em;
        }

        .producto-info {
            padding: clamp(1.5rem, 2.8vw, 2.5rem);
            display: flex;
            flex-direction: column;
            justify-content: center;
        }

        .producto-marca {
            margin: 0;
            color: var(--brand-red);
            letter-spacing: 0.1em;
            font-weight: 600;
            font-size: 0.78rem;
            text-transform: uppercase;
            animation: fadeSlide 0.5s ease 0.1s both;
        }

        .producto-info h1 {
            margin-top: 0.6rem;
            margin-bottom: 0.9rem;
            line-height: 1.1;
            font-family: 'Prata', serif;
            font-size: clamp(2rem, 3.1vw, 3rem);
            animation: fadeSlide 0.55s ease 0.2s both;
        }

        .producto-info p {
            margin-bottom: 1.4rem;
            font-size: 1.02rem;
            line-height: 1.75;
            color: var(--muted);
            animation: fadeSlide 0.6s ease 0.3s both;
        }

        .chips {
            display: flex;
            flex-wrap: wrap;
            gap: 0.6rem;
            margin-bottom: 1.6rem;
            animation: fadeSlide 0.65s ease 0.35s both;
        }

        .chip {
            padding: 0.35rem 0.75rem;
            border-radius: 999px;
            border: 1px solid var(--stroke);
            background: var(--surface);
            font-size: 0.82rem;
            color: var(--brand-green);
            font-weight: 500;
        }

        .acciones {
            display: flex;
            flex-wrap: wrap;
            gap: 0.9rem;
            animation: fadeSlide 0.7s ease 0.45s both;
        }

        #whatsappBtn.boton-whatsapp {
            background: linear-gradient(135deg, var(--brand-green) 0%, var(--brand-green-light) 100%);
            border: 1px solid rgba(85, 107, 47, 0.9);
            color: #fff;
            text-decoration: none;
            padding: 0.85rem 1.2rem;
            border-radius: 999px;
            font-weight: 600;
            letter-spacing: 0.01em;
            box-shadow: 0 10px 18px rgba(85, 107, 47, 0.25);
            transition: transform 0.2s ease, box-shadow 0.2s ease;
        }

        #whatsappBtn.boton-whatsapp:hover {
            transform: translateY(-2px);
            box-shadow: 0 14px 24px rgba(85, 107, 47, 0.32);
        }

        .btn-volver {
            display: inline-block;
            padding: 0.78rem 1.18rem;
            border-radius: 999px;
            text-decoration: none;
            border: 1px solid var(--stroke);
            color: var(--brand-green);
            font-weight: 600;
            background: var(--surface);
            transition: transform 0.2s ease, background-color 0.2s ease, border-color 0.2s ease;
        }

        .btn-volver:hover {
            transform: translateY(-2px);
            border-color: rgba(217, 83, 79, 0.45);
            background: #fff;
        }

        @keyframes riseIn {
            from {
                opacity: 0;
                transform: translateY(16px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        @keyframes softZoom {
            from {
                opacity: 0;
                transform: scale(0.96);
            }

            to {
                opacity: 1;
                transform: scale(1);
            }
        }

        @keyframes fadeSlide {
            from {
                opacity: 0;
                transform: translateY(10px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        @media (max-width: 900px) {
            .producto-detalle-wrap {
                padding-top: 1.2rem;
            }

            .producto-detalle-grid {
                grid-template-columns: 1fr;
            }

            .producto-imagen {
                height: min(66vh, 470px);
            }

            .producto-info {
                padding: 1.35rem;
            }

            .producto-etiqueta {
                left: 1.2rem;
                bottom: 1.2rem;
            }
        }
    </style>
</head>

<body>
    <main class="producto-detalle-wrap">
        <a class="top-back-link" href="index.html">← Seguir viendo catalogo</a>
        <section class="producto-detalle-grid" aria-label="Detalle del producto">
            <div class="producto-visual">
                <img id="productoImg" class="producto-imagen" src="assets/logo.png" alt="Imagen del producto">
                <p class="producto-etiqueta">EDICION PERSONALIZADA</p>
            </div>

            <article class="producto-info">
                <p class="producto-marca">NATIV DESIGN · AMBATO</p>
                <h1 id="productoNombre">Producto</h1>
                <p id="productoDesc">Selecciona un producto desde el catalogo para ver su detalle.</p>

                <div class="chips">
                    <span class="chip">Personalizable</span>
                    <span class="chip">Entrega local</span>
                    <span class="chip">Hecho con amor</span>
                </div>

                <div class="acciones">
                    <a id="whatsappBtn" class="boton-whatsapp" href="https://wa.me/593962959738" target="_blank"
                        rel="noopener noreferrer">Consultar por WhatsApp</a>
                    <a class="btn-volver" href="index.html">Volver al inicio</a>
                </div>
            </article>
        </section>
    </main>

    <script>
        (function () {
            var params = new URLSearchParams(window.location.search);

            var nombre = params.get('nombre') || 'Producto';
            var img = params.get('img') || 'assets/logo.png';
            var desc = params.get('desc') || 'Sin descripcion disponible.';
            var wa = params.get('wa') || ('https://wa.me/593962959738?text=' + encodeURIComponent('Hola, me interesa ' + nombre));

            var nombreEl = document.getElementById('productoNombre');
            var imgEl = document.getElementById('productoImg');
            var descEl = document.getElementById('productoDesc');
            var waEl = document.getElementById('whatsappBtn');

            nombreEl.textContent = nombre;
            imgEl.src = img;
            imgEl.alt = nombre;
            descEl.textContent = desc;
            waEl.href = wa;

            document.title = nombre + ' | Nativ Design';
        })();
    </script>
</body>

</html>
